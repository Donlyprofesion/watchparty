<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Sync · Base64 encoded links</title>
  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    body { background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; padding: 2rem 1rem; margin: 0; }
    .card { background: #1e293b; border-radius: 2rem; padding: 2rem; max-width: 1000px; width: 100%; }
    h2 { margin-top: 0; }
    .hidden { display: none !important; }
    input, button { background: #0f172a; border: 1px solid #334155; color: white; padding: 0.75rem 1rem; border-radius: 3rem; font-size: 1rem; }
    button { background: #3b82f6; border: none; font-weight: 600; cursor: pointer; box-shadow: 0 4px 0 #1e3a8a; }
    button.secondary { background: #334155; box-shadow: 0 4px 0 #1e293b; }
    .room-list { background: #0f172a; border-radius: 2rem; padding: 1.5rem; margin: 1.5rem 0; border: 1px solid #334155; max-height: 200px; overflow-y: auto; }
    .room-list button { background: #2d3b4f; width: 100%; text-align: left; border-radius: 2rem; margin: 0.25rem 0; }
    video { width: 100%; border-radius: 1.5rem; background: black; aspect-ratio: 16/9; }
    #chat { background: #0f172a; border-radius: 1.5rem; padding: 1rem; height: 250px; overflow-y: auto; border: 1px solid #334155; margin-top: 1rem; font-size: 0.95rem; }
    #chat div { border-bottom: 1px solid #334155; padding: 0.25rem 0; }
    .chat-input { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .chat-input input { flex: 1; }
    .message-meta { color: #94a3b8; font-size: 0.75rem; margin-left: 0.5rem; }
    .label { color: #94a3b8; margin-bottom: 0.25rem; }
  </style>
</head>
<body>
<div class="card">
  <!-- LOBBY -->
  <div id="lobby">
    <h2>🎬 Movie Sync · Base64 encoded links</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
      <div><div class="label">your name</div><input type="text" id="user" value="Streamer"></div>
      <div><div class="label">room name</div><input type="text" id="room" value="marvel"></div>
    </div>
    <div style="display: flex; gap: 1rem; margin: 1rem 0;">
      <!-- The default value is a Base64 encoded version of the Big Buck Bunny URL.
           Decodes to: https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4 -->
      <input type="text" id="url" placeholder="Video URL (plain or Base64)" value="aHR0cHM6Ly9jb21tb25kYXRhc3RvcmFnZS5nb29nbGVhcGlzLmNvbS9ndHYtdmlkZW9zLWJ1Y2tldC9zYW1wbGUvQmlnQnVja0J1bm55Lm1wNA==" style="flex: 3;">
      <button onclick="createRoom()">✨ CREATE</button>
    </div>
    <div class="room-list" id="list">loading rooms...</div>
    <p style="color: #94a3b8;">👇 click any room to join</p>
  </div>

  <!-- PLAYER VIEW -->
  <div id="view" class="hidden">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2 id="title">Room: —</h2>
      <button class="secondary" onclick="leaveRoom()">← Leave room</button>
    </div>
    <video id="player" controls></video>

    <!-- GLOBAL CHAT -->
    <div style="margin-top: 1.5rem;">
      <div style="display: flex; gap: 0.5rem; align-items: center;">
        <span style="background: #334155; padding: 0.2rem 1rem; border-radius: 2rem;">💬 room chat</span>
        <span style="color: #94a3b8;">messages are synced</span>
      </div>
      <div id="chat"></div>
      <div class="chat-input">
        <input type="text" id="msg" placeholder="type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">send</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ---------- CONFIGURATION ----------
  const API = "https://movie-sync-api.deagleonlyprofesion.workers.dev"; // no trailing slash

  // ---------- STATE ----------
  let me = "";
  let currentRoom = "";
  let isHost = false;
  let syncInterval = null;
  let chatPollInterval = null;
  let lastChatTimestamp = "1970-01-01 00:00:00";

  function getPlayer() { return document.getElementById('player'); }

  // ---------- LOAD ROOMS (15-second expiration) ----------
  async function loadRooms() {
    try {
      const r = await fetch(`${API}/list`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      const listDiv = document.getElementById('list');
      if (!d || d.length === 0) {
        listDiv.innerHTML = '<div style="color: #94a3b8;">✨ no active rooms</div>';
        return;
      }
      listDiv.innerHTML = d.map(x => 
        `<button onclick="joinRoom('${x.name}','${x.url}')">🎬 Join ${x.name}  ·  host: ${x.host}</button>`
      ).join('');
    } catch (e) {
      document.getElementById('list').innerHTML = '<div style="color: #f87171;">⚠️ cannot reach server</div>';
    }
  }
  setInterval(loadRooms, 5000);
  loadRooms();

  // ---------- CREATE ROOM ----------
  async function createRoom() {
    const user = document.getElementById('user').value.trim();
    const roomName = document.getElementById('room').value.trim();
    let videoUrl = document.getElementById('url').value.trim();

    if (!user || !roomName || !videoUrl) return alert("Fill all fields");

    // If the user entered a plain URL (not Base64), we need to encode it.
    // But we also want to apply Dropbox conversion before encoding.
    // We'll try to detect if it's already Base64: if it contains only valid Base64 chars and length multiple of 4?
    // Simpler: assume it's plain and we always encode. If the user pastes a Base64 string, it will be double-encoded.
    // To avoid that, we can check if the string looks like a URL (starts with http). If it does, we treat as plain.
    // Otherwise, we assume it's already Base64 and leave as is.
    let urlToStore;
    if (videoUrl.startsWith('http://') || videoUrl.startsWith('https://')) {
      // Plain URL: apply Dropbox conversion then encode
      if (videoUrl.includes('dropbox.com') && videoUrl.includes('dl=0')) {
        videoUrl = videoUrl.replace('dl=0', 'raw=1');
      }
      urlToStore = btoa(videoUrl); // encode to Base64
    } else {
      // Assume already Base64 – use as is
      urlToStore = videoUrl;
    }

    me = user;
    currentRoom = roomName;
    isHost = true;

    try {
      await fetch(`${API}/sync`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ r: roomName, h: user, u: urlToStore, t: 0, p: 0 })
      });
    } catch (e) {
      console.warn("Room registered locally only (server unreachable)");
    }

    startPlayer(roomName, urlToStore);
  }

  // ---------- JOIN ROOM ----------
  function joinRoom(roomName, encodedUrl) {
    me = "Guest_" + Math.floor(Math.random() * 900 + 100);
    currentRoom = roomName;
    isHost = false;
    startPlayer(roomName, encodedUrl);
  }

  // ---------- START PLAYER & SYNC ----------
  function startPlayer(roomName, encodedUrl) {
    // Decode the Base64 URL to get the actual video source
    let videoUrl;
    try {
      videoUrl = atob(encodedUrl);
    } catch (e) {
      console.error("Failed to decode Base64 URL, using as is", encodedUrl);
      videoUrl = encodedUrl; // fallback
    }

    document.getElementById('lobby').classList.add('hidden');
    document.getElementById('view').classList.remove('hidden');
    document.getElementById('title').innerText = '🎥 ' + roomName;

    const player = getPlayer();
    if (player) {
      player.src = videoUrl;
      player.load();
    }

    // Clear old intervals
    if (syncInterval) clearInterval(syncInterval);
    if (chatPollInterval) clearInterval(chatPollInterval);

    // Video sync (every 2s) – keeps room alive
    syncInterval = setInterval(async () => {
      const p = getPlayer();
      if (!p) return;
      if (isHost) {
        try {
          await fetch(`${API}/sync`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ r: roomName, h: me, t: p.currentTime || 0, p: p.paused ? 0 : 1 })
          });
        } catch (e) {}
      } else {
        try {
          const res = await fetch(`${API}/get?r=${roomName}`);
          const data = await res.json();
          if (data && typeof data.time === 'number') {
            if (Math.abs(p.currentTime - data.time) > 2.5) p.currentTime = data.time;
            if (data.playing == 1 && p.paused) p.play().catch(() => {});
            else if (data.playing == 0 && !p.paused) p.pause();
          }
        } catch (e) {}
      }
    }, 2000);

    // Chat polling (every 1s)
    lastChatTimestamp = "1970-01-01 00:00:00";
    chatPollInterval = setInterval(async () => {
      if (!currentRoom) return;
      try {
        const url = `${API}/chat/poll?room=${encodeURIComponent(currentRoom)}&after=${encodeURIComponent(lastChatTimestamp)}`;
        const res = await fetch(url);
        const messages = await res.json();
        if (messages && messages.length > 0) {
          const newest = messages[messages.length - 1];
          lastChatTimestamp = newest.created_at;
          const chatDiv = document.getElementById('chat');
          for (let msg of messages) {
            const time = new Date(msg.created_at).toLocaleTimeString();
            chatDiv.innerHTML += `<div><b style="color:#93c5fd">${msg.sender}:</b> ${msg.message} <span class="message-meta">${time}</span></div>`;
          }
          chatDiv.scrollTop = chatDiv.scrollHeight;
        }
      } catch (e) {
        console.warn('chat poll error', e);
      }
    }, 1000);
  }

  // ---------- SEND CHAT MESSAGE ----------
  async function sendMessage() {
    const input = document.getElementById('msg');
    const text = input.value.trim();
    if (!text || !currentRoom || !me) return;

    try {
      await fetch(`${API}/chat/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ room: currentRoom, sender: me, message: text })
      });
      input.value = '';
    } catch (e) {
      alert('Failed to send message');
    }
  }

  // ---------- LEAVE ROOM (with immediate deletion if host) ----------
  async function leaveRoom() {
    // If host, delete the room from server
    if (isHost && currentRoom) {
      try {
        await fetch(`${API}/leave`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ room: currentRoom, host: me })
        });
      } catch (e) {
        console.warn('Failed to delete room on leave', e);
      }
    }

    // Stop intervals
    if (syncInterval) clearInterval(syncInterval);
    if (chatPollInterval) clearInterval(chatPollInterval);

    // Stop video
    const player = getPlayer();
    if (player) { player.pause(); player.src = ''; }

    // Switch to lobby
    document.getElementById('lobby').classList.remove('hidden');
    document.getElementById('view').classList.add('hidden');
    document.getElementById('chat').innerHTML = '';

    // Reset state
    me = '';
    currentRoom = '';
    isHost = false;

    // Refresh room list
    loadRooms();
  }

  // Expose functions globally
  window.createRoom = createRoom;
  window.joinRoom = joinRoom;
  window.leaveRoom = leaveRoom;
  window.sendMessage = sendMessage;
</script>
</body>
</html>
