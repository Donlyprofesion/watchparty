<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <!-- 🔒 Referrer Lockdown -->
  <meta name="referrer" content="no-referrer">
  <title>Movie Sync · mobile friendly</title>
  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    body { background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; padding: 1rem; margin: 0; min-height: 100vh; }
    .card { background: #1e293b; border-radius: 2rem; padding: 2rem; max-width: 1000px; width: 100%; box-shadow: 0 20px 30px -10px #00000055; }
    h2 { margin-top: 0; font-size: 1.5rem; font-weight: 500; letter-spacing: -0.02em; }
    .hidden { display: none !important; }
    input, button { background: #0f172a; border: 1px solid #334155; color: white; padding: 0.75rem 1rem; border-radius: 3rem; font-size: 1rem; outline: none; transition: 0.15s; width: 100%; }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px #3b82f620; }
    button { background: #3b82f6; border: none; font-weight: 600; cursor: pointer; box-shadow: 0 4px 0 #1e3a8a; transition: 0.1s ease; -webkit-tap-highlight-color: transparent; }
    button:active { transform: translateY(4px); box-shadow: none; }
    button.secondary { background: #334155; box-shadow: 0 4px 0 #1e293b; }
    .room-list { background: #0f172a; border-radius: 2rem; padding: 1.5rem; margin: 1.5rem 0; border: 1px solid #334155; max-height: 200px; overflow-y: auto; }
    .room-list button { background: #2d3b4f; width: 100%; text-align: left; border-radius: 2rem; margin: 0.25rem 0; box-shadow: none; border: 1px solid #475569; }
    .flex-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
    .flex-row > * { flex: 1 1 auto; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    video { width: 100%; border-radius: 1.5rem; background: black; aspect-ratio: 16/9; border: 2px solid #334155; }
    #chat { background: #0f172a; border-radius: 1.5rem; padding: 1rem; height: 250px; overflow-y: auto; border: 1px solid #334155; margin-top: 1rem; font-size: 0.95rem; }
    #chat div { border-bottom: 1px solid #334155; padding: 0.25rem 0; }
    .chat-input { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .chat-input input { flex: 1; }
    .message-meta { color: #94a3b8; font-size: 0.75rem; margin-left: 0.5rem; }
    .label { color: #94a3b8; margin-bottom: 0.25rem; font-size: 0.9rem; }
    .toast { background: #b91c1c; color: white; padding: 0.5rem 1rem; border-radius: 2rem; margin-bottom: 1rem; text-align: center; }

    /* 📱 Mobile adjustments */
    @media (max-width: 600px) {
      body { padding: 0.5rem; }
      .card { padding: 1.25rem; border-radius: 1.5rem; }
      h2 { font-size: 1.3rem; }
      .grid-2 { grid-template-columns: 1fr; gap: 0.75rem; }
      .flex-row { flex-direction: column; gap: 0.75rem; }
      .flex-row button { width: 100%; }
      input, button { padding: 0.7rem 1rem; font-size: 16px; } /* prevent zoom on iOS */
      .room-list { padding: 1rem; }
      .room-list button { padding: 0.7rem 1rem; }
      #chat { height: 200px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <!-- 🤖 Bot Cloaking -->
  <script>
    (function() {
      const ua = navigator.userAgent.toLowerCase();
      const botPattern = /bot|crawl|spider|scrape|headless|googlebot|bingbot|slurp|duckduckbot|baiduspider|yandexbot|facebookexternalhit|facebot|twitterbot|whatsapp|telegram/i;
      if (botPattern.test(ua)) {
        window.location.href = 'https://www.google.com/search?q=cute+kittens';
      }
    })();
  </script>

<div class="card">
  <!-- LOBBY -->
  <div id="lobby">
    <h2>🎬 Movie Sync · mobile ready</h2>
    <div class="grid-2">
      <div><div class="label">your name</div><input type="text" id="user" value="Streamer"></div>
      <div><div class="label">room name</div><input type="text" id="room" value="marvel"></div>
    </div>
    <div class="flex-row" style="margin: 1rem 0;">
      <input type="text" id="url" placeholder="Direct video URL (MP4, etc.)" value="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4">
      <button onclick="createRoom()">✨ CREATE</button>
    </div>
    <div class="room-list" id="list">loading rooms...</div>
    <p style="color: #94a3b8; font-size: 0.9rem;">👇 click any room to join</p>
  </div>

  <!-- PLAYER VIEW -->
  <div id="view" class="hidden">
    <div id="kick-message" class="toast hidden">Host has left the room. Returning to lobby...</div>
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem;">
      <h2 id="title" style="margin:0;">Room: —</h2>
      <button class="secondary" onclick="leaveRoom()" style="width: auto; padding: 0.5rem 1.2rem;">← Leave</button>
    </div>
    <video id="player" controls></video>

    <!-- GLOBAL CHAT -->
    <div style="margin-top: 1.5rem;">
      <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
        <span style="background: #334155; padding: 0.2rem 1rem; border-radius: 2rem;">💬 room chat</span>
        <span style="color: #94a3b8; font-size:0.9rem;">messages are synced</span>
      </div>
      <div id="chat"></div>
      <div class="chat-input">
        <input type="text" id="msg" placeholder="type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" style="width: auto; padding: 0.7rem 1.2rem;">send</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ---------- CONFIGURATION ----------
  const API = "https://movie-sync-api.deagleonlyprofesion.workers.dev"; // no trailing slash

  // ---------- STATE ----------
  let me = "";
  let currentRoom = "";
  let isHost = false;
  let syncInterval = null;
  let chatPollInterval = null;
  let lastChatTimestamp = "1970-01-01 00:00:00";

  function getPlayer() { return document.getElementById('player'); }

  // ---------- LOAD ROOMS (15-second expiration) ----------
  async function loadRooms() {
    try {
      const r = await fetch(`${API}/list`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      const listDiv = document.getElementById('list');
      if (!d || d.length === 0) {
        listDiv.innerHTML = '<div style="color: #94a3b8;">✨ no active rooms</div>';
        return;
      }
      listDiv.innerHTML = d.map(x => 
        `<button onclick="joinRoom('${x.name}','${x.url}')">🎬 Join ${x.name}  ·  host: ${x.host}</button>`
      ).join('');
    } catch (e) {
      document.getElementById('list').innerHTML = '<div style="color: #f87171;">⚠️ cannot reach server</div>';
    }
  }
  setInterval(loadRooms, 5000);
  loadRooms();

  // ---------- CREATE ROOM ----------
  async function createRoom() {
    const user = document.getElementById('user').value.trim();
    const roomName = document.getElementById('room').value.trim();
    let videoUrl = document.getElementById('url').value.trim();

    if (!user || !roomName || !videoUrl) return alert("Fill all fields");

    // Dropbox conversion
    if (videoUrl.includes('dropbox.com') && videoUrl.includes('dl=0')) {
      videoUrl = videoUrl.replace('dl=0', 'raw=1');
    }

    me = user;
    currentRoom = roomName;
    isHost = true;

    try {
      await fetch(`${API}/sync`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ r: roomName, h: user, u: videoUrl, t: 0, p: 0 })
      });
    } catch (e) {
      console.warn("Room registered locally only (server unreachable)");
    }

    startPlayer(roomName, videoUrl);
  }

  // ---------- JOIN ROOM ----------
  function joinRoom(roomName, videoUrl) {
    me = "Guest_" + Math.floor(Math.random() * 900 + 100);
    currentRoom = roomName;
    isHost = false;
    startPlayer(roomName, videoUrl);
  }

  // ---------- START PLAYER & SYNC ----------
  function startPlayer(roomName, videoUrl) {
    document.getElementById('lobby').classList.add('hidden');
    document.getElementById('view').classList.remove('hidden');
    document.getElementById('title').innerText = '🎥 ' + roomName;
    document.getElementById('kick-message').classList.add('hidden');

    const player = getPlayer();
    if (player) {
      player.src = videoUrl;
      player.load();
    }

    // Clear old intervals
    if (syncInterval) clearInterval(syncInterval);
    if (chatPollInterval) clearInterval(chatPollInterval);

    // Video sync (every 2s)
    syncInterval = setInterval(async () => {
      const p = getPlayer();
      if (!p) return;

      if (isHost) {
        // Host: push state
        try {
          await fetch(`${API}/sync`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ r: roomName, h: me, t: p.currentTime || 0, p: p.paused ? 0 : 1 })
          });
        } catch (e) {}
      } else {
        // Guest: pull state, kick if room missing
        try {
          const res = await fetch(`${API}/get?r=${roomName}`);
          if (res.status === 404) {
            showKickMessageAndLeave();
            return;
          }
          const data = await res.json();
          if (!data) {
            showKickMessageAndLeave();
            return;
          }
          if (typeof data.time === 'number') {
            if (Math.abs(p.currentTime - data.time) > 2.5) p.currentTime = data.time;
            if (data.playing == 1 && p.paused) p.play().catch(() => {});
            else if (data.playing == 0 && !p.paused) p.pause();
          }
        } catch (e) {
          console.warn('Guest sync error', e);
        }
      }
    }, 2000);

    // Chat polling (every 1s)
    lastChatTimestamp = "1970-01-01 00:00:00";
    chatPollInterval = setInterval(async () => {
      if (!currentRoom) return;
      try {
        const url = `${API}/chat/poll?room=${encodeURIComponent(currentRoom)}&after=${encodeURIComponent(lastChatTimestamp)}`;
        const res = await fetch(url);
        const messages = await res.json();
        if (messages && messages.length > 0) {
          const newest = messages[messages.length - 1];
          lastChatTimestamp = newest.created_at;
          const chatDiv = document.getElementById('chat');
          for (let msg of messages) {
            const time = new Date(msg.created_at).toLocaleTimeString();
            chatDiv.innerHTML += `<div><b style="color:#93c5fd">${msg.sender}:</b> ${msg.message} <span class="message-meta">${time}</span></div>`;
          }
          chatDiv.scrollTop = chatDiv.scrollHeight;
        }
      } catch (e) {
        console.warn('chat poll error', e);
      }
    }, 1000);
  }

  function showKickMessageAndLeave() {
    const msgDiv = document.getElementById('kick-message');
    msgDiv.classList.remove('hidden');
    setTimeout(() => {
      leaveRoom();
    }, 1500);
  }

  // ---------- SEND CHAT MESSAGE ----------
  async function sendMessage() {
    const input = document.getElementById('msg');
    const text = input.value.trim();
    if (!text || !currentRoom || !me) return;

    try {
      await fetch(`${API}/chat/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ room: currentRoom, sender: me, message: text })
      });
      input.value = '';
    } catch (e) {
      alert('Failed to send message');
    }
  }

  // ---------- LEAVE ROOM (with immediate deletion if host) ----------
  async function leaveRoom() {
    // If host, delete the room from server
    if (isHost && currentRoom) {
      try {
        await fetch(`${API}/leave`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ room: currentRoom, host: me })
        });
      } catch (e) {
        console.warn('Failed to delete room on leave', e);
      }
    }

    // Stop intervals
    if (syncInterval) clearInterval(syncInterval);
    if (chatPollInterval) clearInterval(chatPollInterval);

    // Stop video
    const player = getPlayer();
    if (player) { player.pause(); player.src = ''; }

    // Switch to lobby
    document.getElementById('lobby').classList.remove('hidden');
    document.getElementById('view').classList.add('hidden');
    document.getElementById('chat').innerHTML = '';
    document.getElementById('kick-message').classList.add('hidden');

    // Reset state
    me = '';
    currentRoom = '';
    isHost = false;

    // Refresh room list
    loadRooms();
  }

  // Expose functions globally
  window.createRoom = createRoom;
  window.joinRoom = joinRoom;
  window.leaveRoom = leaveRoom;
  window.sendMessage = sendMessage;
</script>
</body>
</html>
